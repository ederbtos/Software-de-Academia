name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run core test suite
        env:
          database_url: sqlite:///./ci.db
          secret_key: ci-secret-key
          superadmin_password: ci-superadmin-password
        run: pytest -q tests

      - name: Run critical E2E flows
        env:
          database_url: sqlite:///./ci.db
          secret_key: ci-secret-key
          superadmin_password: ci-superadmin-password
        run: pytest -q tests/test_e2e_critical_flows.py
